<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; color: #fff; }
    
    /* FORCED LANDSCAPE LOGIC */
    #mainContainer {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        width: 100vw; height: 100vh; transition: transform 0.5s ease;
    }

    @media screen and (orientation: portrait) {
        #mainContainer {
            transform: rotate(90deg);
            width: 100vh;
            height: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
        }
    }

    canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
    .scene { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; }
    .active { display: flex !important; }

    .title { font-size: clamp(30px, 8vw, 60px); font-family: 'Great Vibes', cursive; background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin: 10px; }
    .btn { padding: 12px 35px; font-size: 18px; border: none; border-radius: 35px; cursor: pointer; font-weight: bold; transition: 0.3s; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    
    #mainImg { max-width: 75%; max-height: 65%; border: 6px solid white; border-radius: 12px; transition: opacity 1s; }
    .collage-img { position: absolute; width: 75px; height: 75px; object-fit: cover; border: 2px solid white; border-radius: 8px; opacity: 0; transition: opacity 1.5s; z-index: 20; }
    
    #teddyPrank { position: relative; margin-bottom: 20px; transform: scale(0.7); display: none; z-index: 50; }
    .t-head { width: 100px; height: 90px; background: #eacda3; border-radius: 50%; border: 2px solid #d4a373; position: relative; }
    .t-body { width: 110px; height: 95px; background: #eacda3; border-radius: 40%; border: 2px solid #d4a373; margin-top: -20px; }
    #gunIcon { position: absolute; right: -35px; bottom: 15px; font-size: 45px; }

    .shake-effect { animation: vibrate 0.1s linear infinite; }
    @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(-4px, 4px); } 50% { transform: translate(4px, -4px); } 100% { transform: translate(0); } }
</style>
</head>
<body>

<div id="mainContainer">
    <canvas id="galaxy"></canvas>
    <audio id="music" loop><source src="music.mp3"></audio>

    <div id="introScene" class="scene active">
        <h1 class="title">Dhanushaaaa ✨</h1>
        <div id="teddyPrank">
            <div class="t-head"></div>
            <div class="t-body"><div id="gunIcon">🔫</div></div>
        </div>
        <div id="btnGroup" style="display:flex; gap: 30px;">
            <button class="btn" style="background:#4B79A1; color:white;" onclick="nextScene('candleScene')">YES</button>
            <button id="noBtn" class="btn" style="background:#ff4d4d; color:white;" onmouseover="doPrank()" onclick="doPrank()">NO</button>
        </div>
    </div>

    <div id="candleScene" class="scene">
        <div id="countdown" style="font-size: 60px; color: #ffd65c; font-family: 'Great Vibes';">Make a wish...</div>
        <div style="width: 20px; height: 70px; background: #eee; border-radius: 5px; position: relative; margin: 20px 0;">
            <div id="flame" onclick="blowOut()" style="display:none; position: absolute; top: -40px; left: -5px; width: 30px; height: 50px; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50%; cursor: pointer;"></div>
        </div>
        <button id="startBdayBtn" class="btn" style="background:#4B79A1; color:white;" onclick="runCountdown()">LIGHT IT! 🕯️</button>
    </div>

    <div id="cakeScene" class="scene">
        <h2 class="title" style="font-size: 35px;">Birthday Girl 🎂</h2>
        <div style="width: 150px; height: 80px; background: pink; border-radius: 12px; border: 4px solid #fff; position: relative;"></div>
        <button id="cutBtn" class="btn" style="background:#4B79A1; color:white; margin-top:25px;" onclick="cutCake()">CUT THE CAKE</button>
        <div id="cakeMsg" style="margin-top: 20px; font-family: 'Great Vibes'; font-size: 32px; color: #ffd65c;"></div>
    </div>

    <div id="photoScene" class="scene"><img id="mainImg"></div>

    <div id="finalScene" class="scene">
        <h1 class="title" style="font-size: 40px; margin-bottom: 10px;">Happy Birthday Dhanushaaaa 🎉</h1>
        <p style="font-family: 'Great Vibes'; font-size: 24px; color: #ffd65c; margin: 0;">Stay awesome, always! ✨</p>
        <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0; pointer-events:none;"></div>
    </div>
</div>

<script>
    let heartMode = false, fireworkMode = false, particles = [];
    const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.png", "photo10.jpg"];

    function nextScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function doPrank() {
        document.getElementById("mainContainer").classList.add("shake-effect");
        document.getElementById("teddyPrank").style.display = "block";
        setTimeout(() => {
            document.getElementById("mainContainer").classList.remove("shake-effect");
            document.getElementById("teddyPrank").style.display = "none";
            const no = document.getElementById("noBtn");
            no.style.position = "absolute";
            no.style.left = Math.random() * 50 + 10 + "%"; no.style.top = Math.random() * 50 + 10 + "%";
        }, 1200);
    }

    function runCountdown() {
        document.getElementById("startBdayBtn").style.display = "none";
        let c = 3;
        const t = setInterval(() => {
            document.getElementById("countdown").innerText = c;
            if(c<=0){ clearInterval(t); document.getElementById("countdown").innerText="🔥"; document.getElementById("flame").style.display="block"; }
            c--;
        }, 1000);
    }

    function blowOut() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("music").play();
        setTimeout(() => nextScene('cakeScene'), 800);
    }

    function cutCake() {
        document.getElementById("cutBtn").style.display = "none";
        document.getElementById("cakeMsg").innerText = "Special things coming... 💖";
        setTimeout(() => { nextScene('photoScene'); startGallery(); }, 2500);
    }

    function startGallery() {
        let idx = 0;
        const img = document.getElementById("mainImg");
        img.src = photos[idx];
        const loop = setInterval(() => {
            idx++;
            if(idx >= photos.length - 1) { clearInterval(loop); startFinal(); return; }
            img.style.opacity = 0;
            setTimeout(() => { img.src = photos[idx]; img.style.opacity = 1; }, 500);
        }, 4000);
    }

    function startFinal() {
        nextScene('finalScene');
        heartMode = true; fireworkMode = true;
        const locs = [{top:'5%',left:'5%'},{top:'5%',right:'5%'},{bottom:'5%',left:'5%'},{bottom:'5%',right:'5%'},{top:'45%',left:'2%'},{top:'45%',right:'2%'}];
        photos.slice(0, 6).forEach((s, i) => {
            setTimeout(() => {
                const el = document.createElement("img"); el.src = s; el.className = "collage-img";
                if(locs[i].top) el.style.top = locs[i].top; if(locs[i].bottom) el.style.bottom = locs[i].bottom;
                if(locs[i].left) el.style.left = locs[i].left; if(locs[i].right) el.style.right = locs[i].right;
                document.getElementById("collageArea").appendChild(el);
                setTimeout(() => el.style.opacity = "1", 100);
            }, i * 1500);
        });
    }

    const cvs = document.getElementById("galaxy");
    const x = cvs.getContext("2d");
    function resize() { 
        cvs.width = window.innerWidth > window.innerHeight ? window.innerWidth : window.innerHeight; 
        cvs.height = window.innerWidth > window.innerHeight ? window.innerHeight : window.innerWidth;
    }
    window.addEventListener('resize', resize);
    resize();

    let stars = [];
    for(let i=0; i<200; i++) stars.push({x: Math.random()*2000, y: Math.random()*2000, s: Math.random()*1.5});

    function render() {
        x.clearRect(0,0,cvs.width,cvs.height);
        stars.forEach((s, i) => {
            if(heartMode) {
                let t = i/stars.length*Math.PI*2;
                let hx = 16*Math.pow(Math.sin(t),3);
                let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
                s.x += (cvs.width/2 + hx*12 - s.x) * 0.01; s.y += (cvs.height/2 - hy*12 - s.y) * 0.01;
            } else { s.y += 0.5; if(s.y > cvs.height) s.y = 0; }
            x.fillStyle = "#fff"; x.fillRect(s.x, s.y, s.s, s.s);
        });
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.l -= 0.8;
            x.fillStyle = p.c; x.beginPath(); x.arc(p.x, p.y, p.sz, 0, Math.PI*2); x.fill();
            if(p.l <= 0) particles.splice(i,1);
        });
        if(fireworkMode && Math.random() < 0.05) {
            let px = Math.random()*cvs.width, py = Math.random()*cvs.height*0.5;
            for(let i=0; i<40; i++) particles.push({x:px, y:py, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, l:50, c:"#ffd65c", sz:2});
        }
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
