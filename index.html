<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    /* THE FIX: PRECISE ROTATION MATH */
    @media screen and (max-width: 900px) and (orientation: portrait) {
        body {
            transform: rotate(90deg);
            transform-origin: center;
            width: 100vh !important;
            height: 100vw !important;
            position: fixed;
            top: 50%;
            left: 50%;
            margin-top: -50vw;
            margin-left: -50vh;
            overflow: hidden;
        }
    }

    body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; color: #fff; text-align: center; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000; }

    /* ROTATION OVERLAY */
    #rotateOverlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: none;
        flex-direction: column; justify-content: center; align-items: center; color: #ffd65c;
    }
    .phone-icon { font-size: 50px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }

    @media screen and (max-width: 900px) and (orientation: portrait) {
        #rotateOverlay { display: flex; }
        .scene.active { display: none !important; }
    }

    .scene { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .active { display: flex !important; }
    
    /* Responsive Title */
    .title { font-size: clamp(30px, 8vh, 60px); font-family: 'Great Vibes', cursive; background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; z-index: 100; margin: 5px; }

    /* TEDDY - Scaled for Mobile */
    #teddyPrank { position: relative; margin-bottom: 20px; transform: scale(0.6); z-index: 300; display: none; }
    .t-ear { width: 45px; height: 45px; background: #d4a373; border-radius: 50%; position: absolute; top: -5px; border: 2px solid #bc8a5f; }
    .t-head { width: 120px; height: 105px; background: #eacda3; border-radius: 50% 50% 45% 45%; position: relative; z-index: 2; border: 2px solid #d4a373; }
    .t-snout { width: 45px; height: 35px; background: #fff; border-radius: 50%; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); opacity: 0.8; }
    .t-body { width: 130px; height: 110px; background: #eacda3; border-radius: 42%; margin-top: -25px; position: relative; z-index: 1; border: 2px solid #d4a373; }
    #gunIcon { position: absolute; right: -35px; bottom: 30px; font-size: 50px; }

    /* BUTTONS */
    .btn-row { display: flex; gap: 20px; margin-top: 15px; z-index: 200; position: relative; }
    .btn { padding: 10px 30px; font-size: 16px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }

    /* FINALE IMAGES */
    #mainImg { max-width: 60%; max-height: 50%; border: 5px solid white; border-radius: 10px; transition: opacity 1s; }
    .collage-img { position: absolute; width: 70px; height: 70px; object-fit: cover; border: 2px solid white; border-radius: 8px; opacity: 0; transition: opacity 2s; }
    .img-10-bg { position: absolute; width: 150px; opacity: 0; transition: opacity 3s; z-index: 1; border-radius: 10px; }
    .img-9-behind { width: 200px; height: 120px; object-fit: cover; border: 2px solid #ffd65c; border-radius: 10px; opacity: 0; transition: opacity 1.5s; }

    .shake-effect { animation: vibrate 0.1s linear infinite; }
    @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } 100% { transform: translate(0); } }
</style>
</head>
<body id="mainBody">

<div id="rotateOverlay">
    <div class="phone-icon">📱🔄</div>
    <p style="font-size: 16px;">Rotate phone to see the surprise! ✨</p>
    <button class="btn" style="background:#ffd65c; color:black;" onclick="document.getElementById('rotateOverlay').style.display='none'">I'M READY</button>
</div>

<canvas id="galaxy"></canvas>
<audio id="music" loop><source src="music.mp3"></audio>

<div id="introScene" class="scene active">
    <h1 class="title">Dhanushaaaa ✨</h1>
    <p id="promptMsg">Ready for your surprise?</p>
    <div id="teddyPrank">
        <div class="t-ear" style="left:5px;"></div><div class="t-ear" style="right:5px;"></div>
        <div class="t-head">
            <div style="left:28px; width:10px; height:10px; background:#332211; border-radius:50%; position:absolute; top:40px;"></div>
            <div style="right:28px; width:10px; height:10px; background:#332211; border-radius:50%; position:absolute; top:40px;"></div>
            <div class="t-snout"></div>
        </div>
        <div class="t-body"><div id="gunIcon">🔫</div></div>
    </div>
    <div class="btn-row" id="btnGroup">
        <button id="yesBtn" class="btn" style="background:#4B79A1; color:white;" onclick="nextScene('candleScene')">YES</button>
        <button id="noBtn" class="btn" style="background:#ff4d4d; color:white;" onmouseover="doPrank()" onclick="doPrank()">NO</button>
    </div>
</div>

<div id="candleScene" class="scene">
    <div id="countdown" style="font-size: 60px; color: #ffd65c; font-family: 'Great Vibes';">✨</div>
    <div style="width: 20px; height: 60px; background: #eee; border-radius: 5px; position: relative; margin: 10px 0;">
        <div id="flame" onclick="blowOut()" style="display:none; position: absolute; top: -35px; left: -5px; width: 30px; height: 45px; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50%; cursor: pointer;"></div>
    </div>
    <button id="startBdayBtn" class="btn" style="background:#4B79A1; color:white;" onclick="runCountdown()">START ✨</button>
    <p id="blowPrompt" style="display:none; font-family: 'Great Vibes'; font-size: 20px;">Tap the flame!</p>
</div>

<div id="cakeScene" class="scene">
    <h2 class="title" style="font-size: 30px;">Time to cut your Cake! 🎂</h2>
    <div style="width: 140px; height: 70px; background: pink; border-radius: 10px; border: 3px solid #fff; position: relative; margin: 10px;"></div>
    <button id="cutBtn" class="btn" style="background:#4B79A1; color:white;" onclick="cutCake()">CUT CAKE</button>
    <div id="cakeMsg" style="margin-top: 10px; font-family: 'Great Vibes'; font-size: 24px; color: #ffd65c;"></div>
</div>

<div id="photoScene" class="scene"><img id="mainImg"></div>

<div id="finalScene" class="scene">
    <img src="photo10.jpg" id="bgPhoto10" class="img-10-bg">
    <div class="finale-container">
        <img src="photo9.png" id="lastPhoto9" class="img-9-behind">
        <h1 class="title" style="font-size: 35px; margin-top:10px;">Happy Birthday Baddieeee 🎉</h1>
        <p style="font-family: 'Great Vibes'; font-size: 20px; color: #ffd65c;">Still the coolest girl in the universe ✨</p>
        <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0;"></div>
    </div>
</div>

<script>
    let heartMode = false, fireworkMode = false, particles = [], autoCutTimer;
    const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.png"];

    function nextScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'cakeScene') autoCutTimer = setTimeout(cutCake, 7000);
    }

    function doPrank() {
        document.getElementById("mainBody").classList.add("shake-effect");
        document.getElementById("btnGroup").style.visibility = "hidden";
        document.getElementById("teddyPrank").style.display = "block";
        setTimeout(() => {
            document.getElementById("mainBody").classList.remove("shake-effect");
            document.getElementById("teddyPrank").style.display = "none";
            document.getElementById("btnGroup").style.visibility = "visible";
            const no = document.getElementById("noBtn");
            no.style.position = "absolute";
            no.style.left = Math.random() * 60 + "%"; no.style.top = Math.random() * 60 + "%";
        }, 2000);
    }

    function runCountdown() {
        document.getElementById("startBdayBtn").style.display = "none";
        let c = 5;
        const cd = document.getElementById("countdown");
        const t = setInterval(() => {
            c--; cd.innerText = c;
            if(c<=0){ clearInterval(t); cd.innerText="❤️"; document.getElementById("flame").style.display="block"; document.getElementById("blowPrompt").style.display="block"; }
        }, 1000);
    }

    function blowOut() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("music").play();
        setTimeout(() => nextScene('cakeScene'), 1000);
    }

    function cutCake() {
        clearTimeout(autoCutTimer);
        document.getElementById("cutBtn").style.display = "none";
        document.getElementById("cakeMsg").innerText = "A small bite for you 😋";
        setTimeout(() => {
            document.getElementById("cakeMsg").innerText = "Wait Supergirllll 😎✨";
            setTimeout(() => { nextScene('photoScene'); startGallery(); }, 3000);
        }, 2000);
    }

    function startGallery() {
        let idx = 0;
        const img = document.getElementById("mainImg");
        img.src = photos[idx];
        const loop = setInterval(() => {
            idx++;
            if(idx >= photos.length) { clearInterval(loop); startFinal(); return; }
            img.style.opacity = 0;
            setTimeout(() => { img.src = photos[idx]; img.style.opacity = 1; }, 800);
        }, 7000);
    }

    function startFinal() {
        nextScene('finalScene');
        heartMode = true; fireworkMode = true;
        setTimeout(() => { 
            document.getElementById("bgPhoto10").style.opacity = "1";
            document.getElementById("lastPhoto9").style.opacity = "1";
        }, 1500);
        const locs = [{top:'2%', left:'2%'}, {top:'2%', right:'2%'}, {top:'40%', left:'2%'}, {top:'40%', right:'2%'}, {bottom:'2%', left:'2%'}, {bottom:'2%', right:'2%'}];
        photos.slice(0, 6).forEach((s, i) => {
            setTimeout(() => {
                const el = document.createElement("img"); el.src = s; el.className = "collage-img";
                const p = locs[i];
                if(p.top) el.style.top = p.top; if(p.bottom) el.style.bottom = p.bottom;
                if(p.left) el.style.left = p.left; if(p.right) el.style.right = p.right;
                document.getElementById("collageArea").appendChild(el);
                setTimeout(() => el.style.opacity = "1", 100);
            }, i * 1500);
        });
    }

    const cvs = document.getElementById("galaxy");
    const x = cvs.getContext("2d");
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    let stars = [];
    for(let i=0; i<150; i++) stars.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*1.2});

    function render() {
        x.clearRect(0,0,cvs.width,cvs.height);
        stars.forEach((s, i) => {
            if(heartMode) {
                let t = i/stars.length*Math.PI*2;
                let hx = 16*Math.pow(Math.sin(t),3);
                let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
                s.x += (cvs.width/2 + hx*12 - s.x) * 0.003; s.y += (cvs.height/2 - hy*12 - s.y) * 0.003;
            } else { s.y += 0.3; if(s.y > cvs.height) s.y = 0; }
            x.fillStyle = "#fff"; x.fillRect(s.x, s.y, s.s, s.s);
        });
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.07; p.l -= 0.8;
            x.fillStyle = p.c; x.beginPath(); x.arc(p.x, p.y, p.sz, 0, Math.PI*2); x.fill();
            if(p.l <= 0) particles.splice(i,1);
        });
        if(fireworkMode && Math.random() < 0.05) {
            let px = Math.random()*cvs.width, py = Math.random()*cvs.height*0.5;
            for(let i=0; i<30; i++) particles.push({x:px, y:py, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, l:40, c:'#ffd65c', sz:1.5});
        }
        requestAnimationFrame(render);
    }
    render();
    window.onresize = () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; };
</script>
</body>
</html>
