<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Dhanushaaaa ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #F5F5DC; /* Beige */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #4B79A1; /* Dusky Blue */
        }

        h1 {
            color: #C84B81; /* Dusty Rose */
            text-align: center;
            padding: 20px;
        }

        /* The Game Section */
        .btn-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #C84B81; /* Dusty Rose */
            color: white;
            box-shadow: 0 4px 15px rgba(200, 75, 129, 0.3);
        }

        #noBtn {
            background-color: #4B79A1; /* Dusky Blue */
            color: white;
            position: absolute;
        }

        /* The Birthday Section */
        .hidden { display: none; }

        .cake-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cake {
            width: 180px;
            height: 120px;
            background: #FFDAB9; /* Peach Skyline */
            border-radius: 20px 20px 5px 5px;
            position: relative;
            box-shadow: 0 6px #E9967A;
        }

        .candle {
            width: 14px;
            height: 45px;
            background: #8FBC8F; /* Sage Green */
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            border-radius: 3px;
        }

        .flame {
            width: 18px;
            height: 28px;
            background: radial-gradient(#FFA500, #FF4500);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -30px;
            left: -2px;
            box-shadow: 0 0 20px #FFA500;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        #message {
            margin-top: 30px;
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-section">
        <h1>Will you celebrate with me, Dhanushaaaa?</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="showCake()">Yes</button>
            <button id="noBtn" onmouseover="runAway()" onclick="runAway()">No</button>
        </div>
    </div>

    <div id="birthday-section" class="hidden">
        <h1>Happy Birthday, Dhanushaaaa! 🎂</h1>
        <div class="cake-container">
            <div class="cake">
                <div class="candle" onclick="celebrate()">
                    <div id="flame" class="flame"></div>
                </div>
            </div>
            <p id="message">Tap the candle to blow it out...</p>
        </div>
    </div>

    <audio id="bdaySong" src="music.mp3" preload="auto"></audio>

    <script>
        // Move the NO button
        function runAway() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Switch to cake section
        function showCake() {
            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('birthday-section').classList.remove('hidden');
        }

        // The Final Surprise
        function celebrate() {
            const flame = document.getElementById('flame');
            const song = document.getElementById('bdaySong');
            const msg = document.getElementById('message');

            // 1. Blow out flame
            flame.style.display = 'none';

            // 2. Play Music (Fixed for Mobile!)
            song.play();

            // 3. Launch Confetti with her favorite colors!
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#C84B81', '#4B79A1', '#8FBC8F', '#FFDAB9']
            });

            // 4. Change Message
            msg.innerText = "✨ May all your wishes come true! ✨";
            msg.style.color = "#C84B81";
        }
    </script>
</body>
</html>
