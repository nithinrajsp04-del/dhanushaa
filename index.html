<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body { margin: 0; overflow: hidden; background: black; font-family: 'Poppins', sans-serif; color: white; text-align: center; }
canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }
.scene { position: absolute; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
.active { display: flex; }
.title { font-size: 75px; font-family: 'Great Vibes', cursive; background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* --- TEDDY --- */
.teddy-wrapper { position: relative; width: 220px; height: 280px; margin-bottom: 20px; }
.t-ear { width: 50px; height: 50px; background: #d2b48c; border-radius: 50%; position: absolute; top: 0; }
.t-ear.left { left: 30px; } .t-ear.right { right: 30px; }
.t-head { width: 120px; height: 100px; background: #d2b48c; border-radius: 50%; position: absolute; top: 20px; left: 50px; }
.t-eye { width: 14px; height: 14px; background: #222; border-radius: 50%; position: absolute; top: 40px; }
.t-eye.left { left: 30px; } .t-eye.right { right: 30px; }
.t-body { width: 130px; height: 130px; background: #d2b48c; border-radius: 45%; position: absolute; top: 100px; left: 45px; }

/* --- CANDLE --- */
.candle-body { width: 25px; height: 90px; background: linear-gradient(to right, #e0e0e0, #ffffff, #e0e0e0); border-radius: 4px; position: relative; }
.flame-container { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 30px; height: 50px; cursor: pointer; animation: flicker 0.1s infinite alternate; }
.flame-main { width: 100%; height: 100%; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50% 50% 20% 20%; filter: blur(1px); }

/* --- BUTTONS --- */
.btn { padding: 12px 35px; font-size: 18px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; z-index: 20; font-family: 'Poppins'; }
#yesBtn { background: #4B79A1; color: white; }
#noBtn { background: #333; color: #777; position: absolute; }
#startBdayBtn { background: #C84B81; color: white; }
#cutBtn { background: #ffd65c; box-shadow: 0 0 15px #ffd65c; color: black; }

/* --- IMAGES --- */
#mainImg { max-width: 85%; max-height: 80%; border: 8px solid white; border-radius: 15px; transition: opacity 0.8s; }
.collage-img { position: absolute; width: 160px; height: 160px; object-fit: cover; border: 4px solid white; border-radius: 10px; z-index: 5; opacity: 0; animation: appear 1.5s forwards; }

@keyframes appear { to { opacity: 1; } }
@keyframes flicker { from { transform: scale(1); } to { transform: scale(1.1); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<audio id="music" loop><source src="music.mp3"></audio>

<div id="introScene" class="scene active">
    <h1 class="title">Dhanushaaaa ✨</h1>
    <p>Ready for your surprise?</p>
    <div id="teddyPrank" class="teddy-wrapper" style="display:none; transform: scale(0.85);">
        <div class="t-ear left"></div><div class="t-ear right"></div>
        <div class="t-head"><div class="t-eye left"></div><div class="t-eye right"></div></div>
        <div class="t-body"></div>
    </div>
    <div id="btnContainer" style="position:relative; width:300px; height:100px;">
        <button id="yesBtn" class="btn" onclick="sayYes()">YES</button>
        <button id="noBtn" class="btn">NO</button>
    </div>
</div>

<div id="candleScene" class="scene">
    <div id="countdown" style="font-size: 80px; font-family: 'Great Vibes'; color: #ffd65c; margin-bottom:10px;">✨</div>
    <div class="candle-body">
        <div id="flame" class="flame-container" onclick="blowOut()" style="display:none;">
            <div class="flame-main"></div>
        </div>
    </div>
    <button id="startBdayBtn" class="btn" onclick="triggerCountdown()">START BIRTHDAY ✨</button>
    <p id="blowText" style="font-size: 28px; color: #ffd65c; font-family: 'Great Vibes'; margin-top: 20px; display:none;">Tap the flame to blow it out!</p>
</div>

<div id="cakeScene" class="scene">
    <h2 class="title" style="font-size: 40px;">Time to cut your Cake! 🎂</h2>
    <div style="width: 200px; height: 100px; background: pink; border-radius: 15px; border: 4px solid #fff; margin-bottom: 20px;"></div>
    <button id="cutBtn" class="btn" onclick="doCut()">CUT THE CAKE</button>
    <div id="cakeMsg" style="margin-top: 25px; font-family: 'Great Vibes'; font-size: 45px;"></div>
</div>

<div id="photoScene" class="scene">
    <img id="mainImg" src="">
</div>

<div id="finalScene" class="scene">
    <h1 class="title" style="font-size: 70px;">Happy Birthday Baddieeee 🎉</h1>
    <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0;"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let stars = []; let fireworks = []; let heartMode = false; let fireworkMode = false;
let autoCutTimer;

for(let i=0; i<800; i++) { stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5}); }

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.sx = (Math.random() - 0.5) * 12; this.sy = (Math.random() - 0.5) * 12;
        this.life = 1.0;
    }
    update() { this.x += this.sx; this.y += this.sy; this.life -= 0.02; }
    draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill(); }
}

function createFirework() {
    const x = Math.random() * canvas.width; const y = Math.random() * (canvas.height/2);
    const color = `hsl(${Math.random()*360}, 100%, 60%)`;
    for(let i=0; i<45; i++) fireworks.push(new Particle(x, y, color));
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    stars.forEach((s, i) => {
        if(heartMode) {
            let t = i/stars.length*Math.PI*2;
            let hx = 16*Math.pow(Math.sin(t),3);
            let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            s.x += (canvas.width/2 + hx*18 - s.x) * 0.02;
            s.y += (canvas.height/2 - hy*18 - s.y) * 0.02;
        } else { s.y += 0.2; if(s.y > canvas.height) s.y = 0; }
        ctx.fillStyle = "white"; ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    fireworks.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) fireworks.splice(i, 1); });
    if(fireworkMode && Math.random() < 0.07) createFirework();
    requestAnimationFrame(draw);
}

function sayYes() {
    document.getElementById("btnContainer").style.display = "none";
    document.getElementById("teddyPrank").style.display = "block";
    setTimeout(() => { showScene("candleScene"); }, 2000);
}

function triggerCountdown() {
    document.getElementById("startBdayBtn").style.display = "none";
    let count = 5;
    const cd = document.getElementById("countdown");
    cd.innerText = count;
    const timer = setInterval(() => {
        count--; cd.innerText = count;
        if(count <= 0) {
            clearInterval(timer); cd.innerText = "❤️";
            document.getElementById("flame").style.display = "block";
            document.getElementById("blowText").style.display = "block";
        }
    }, 1000);
}

function blowOut() {
    document.getElementById("flame").style.display = "none";
    document.getElementById("blowText").style.display = "none";
    document.getElementById("music").play();
    setTimeout(() => { 
        showScene("cakeScene"); 
        // START 8 SECOND AUTO-PROCEED TIMER
        autoCutTimer = setTimeout(() => { doCut(); }, 8000);
    }, 1500);
}

let cutAlreadyCalled = false;
function doCut() {
    if(cutAlreadyCalled) return;
    cutAlreadyCalled = true;
    clearTimeout(autoCutTimer); // Stop the auto-timer if she clicked it

    const msg = document.getElementById("cakeMsg");
    msg.innerText = "A small bite for you 😋";
    setTimeout(() => {
        msg.innerText = "Waittt Supergirllll 😎✨";
        setTimeout(() => { showScene("photoScene"); startSlideshow(); }, 2000);
    }, 2000);
}

let photoFiles = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.png"];
let pIdx = 0;

function startSlideshow() {
    const img = document.getElementById("mainImg");
    img.src = photoFiles[pIdx];
    const slide = setInterval(() => {
        pIdx++;
        if(pIdx >= photoFiles.length) { clearInterval(slide); startFinal(); return; }
        img.style.opacity = 0;
        setTimeout(() => { img.src = photoFiles[pIdx]; img.style.opacity = 1; }, 800);
    }, 8000);
}

function startFinal() {
    showScene("finalScene");
    heartMode = true; fireworkMode = true;
    photoFiles.forEach((src, i) => {
        setTimeout(() => {
            const fImg = document.createElement("img");
            fImg.src = src; fImg.className = "collage-img";
            fImg.style.left = Math.random() * 80 + "%"; fImg.style.top = Math.random() * 80 + "%";
            document.getElementById("collageArea").appendChild(fImg);
        }, i * 1000);
    });
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener('mouseover', () => {
    noBtn.style.left = Math.random() * 200 + "px";
    noBtn.style.top = (Math.random() * 100 - 50) + "px";
});

function showScene(id) {
    document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

draw();
</script>
</body>
</html>
