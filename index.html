<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.active { display: flex; }

.title { 
    font-size: 75px; 
    font-family: 'Great Vibes', cursive; 
    background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); 
    -webkit-background-clip:text; 
    -webkit-text-fill-color:transparent;
    margin: 10px;
}

/* --- TEDDY DESIGN --- */
.teddy-wrapper { position: relative; width: 220px; height: 280px; margin-bottom: 20px; }
.t-ear { width: 50px; height: 50px; background: #d2b48c; border-radius: 50%; position: absolute; top: 0; z-index: 2;}
.t-ear.left { left: 30px; } .t-ear.right { right: 30px; }
.t-head { width: 120px; height: 100px; background: #d2b48c; border-radius: 50%; position: absolute; top: 20px; left: 50px; z-index: 4; }
.t-eye { width: 14px; height: 14px; background: #222; border-radius: 50%; position: absolute; top: 40px; }
.t-eye.left { left: 30px; } .t-eye.right { right: 30px; }
.t-muzzle { width: 50px; height: 40px; background: #ffffff; border-radius: 50%; position: absolute; top: 55px; left: 35px; }
.t-body { width: 130px; height: 130px; background: #d2b48c; border-radius: 45%; position: absolute; top: 100px; left: 45px; z-index: 3; }

/* --- BUTTONS --- */
.btn { padding: 12px 35px; font-size: 18px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; z-index: 20; }
#yesBtn { background: #4B79A1; color: white; }
#noBtn { background: #333; color: #777; position: absolute; }
#cutBtn { background: #ffd65c; box-shadow: 0 0 15px #ffd65c; color: black; }

/* --- SLIDESHOW --- */
.img-container {
    width: 80%;
    height: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
}
#mainImg { 
    max-width: 100%; 
    max-height: 100%; 
    border: 10px solid white; 
    border-radius: 15px; 
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
    transition: opacity 0.8s ease-in-out;
    background: #222; /* Placeholder if img fails */
}

.collage-img { 
    position: absolute; width: 150px; height: 150px; 
    object-fit: cover; border: 4px solid white; border-radius: 10px; 
    z-index: 5; opacity: 0; animation: appear 1.5s forwards; 
}

@keyframes appear { to { opacity: 1; } }
@keyframes sliceAnim { 0% { transform: translate(0,0); } 100% { transform: translate(-100px, 100px); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<audio id="music" loop><source src="music.mp3"></audio>

<div id="introScene" class="scene active">
    <h1 class="title">Dhanushaaaa ✨</h1>
    <p>Ready for your surprise?</p>
    <div id="btnContainer" style="position:relative; width:300px; height:150px;">
        <button id="yesBtn" class="btn" onclick="startSurprise()">YES</button>
        <button id="noBtn" class="btn">NO</button>
    </div>
</div>

<div id="cakeScene" class="scene">
    <h2 class="title" style="font-size: 40px;">Time to cut your Cake! 🎂</h2>
    <div style="width: 200px; height: 100px; background: #ffc0cb; border-radius: 10px; border: 4px solid white; margin: 20px;"></div>
    <button id="cutBtn" class="btn" onclick="doCut()">CUT THE CAKE</button>
    <div id="cakeMsg" style="margin-top: 20px; font-size: 30px; font-family: 'Great Vibes';"></div>
</div>

<div id="photoScene" class="scene">
    <div class="img-container">
        <img id="mainImg" src="" alt="Birthday Moment">
    </div>
</div>

<div id="finalScene" class="scene">
    <h1 class="title" style="font-size: 60px;">Happy Birthday Baddie 🎉</h1>
    <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0; pointer-events:none;"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let particles = [];
let heartMode = false;
let fireworkMode = false;

// Star setup
for(let i=0; i<400; i++) {
    stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2 });
}

function createFirework() {
    if(!fireworkMode) return;
    const x = Math.random() * canvas.width;
    const y = Math.random() * (canvas.height * 0.5);
    const color = `hsl(${Math.random() * 360}, 100%, 70%)`;
    for(let i=0; i<30; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5) * 10,
            vy: (Math.random()-0.5) * 10,
            life: 1.0,
            color: color
        });
    }
}

function animate() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    stars.forEach((s, i) => {
        if(heartMode) {
            let t = i/stars.length*Math.PI*2;
            let hx = 16*Math.pow(Math.sin(t),3);
            let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            s.x += (canvas.width/2 + hx*15 - s.x) * 0.02;
            s.y += (canvas.height/2 - hy*15 - s.y) * 0.02;
        } else {
            s.y += 0.5; if(s.y > canvas.height) s.y = 0;
        }
        ctx.fillStyle = "white";
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;

    if(fireworkMode && Math.random() < 0.08) createFirework();
    requestAnimationFrame(animate);
}

function showScene(id) {
    document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function startSurprise() {
    document.getElementById("music").play();
    showScene("cakeScene");
}

function doCut() {
    document.getElementById("cakeMsg").innerText = "Yay! Get Ready...";
    setTimeout(() => {
        showScene("photoScene");
        startSlideshow();
    }, 1500);
}

// SLIDESHOW LOGIC
const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.pngg"];
let pIdx = 0;

function startSlideshow() {
    const img = document.getElementById("mainImg");
    img.src = photos[pIdx];
    
    const interval = setInterval(() => {
        pIdx++;
        if(pIdx >= photos.length) {
            clearInterval(interval);
            startFinal();
            return;
        }
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = photos[pIdx];
            img.style.opacity = 1;
        }, 800);
    }, 8000); // 8 SECONDS
}

function startFinal() {
    showScene("finalScene");
    heartMode = true;
    fireworkMode = true;
    
    // Add small photos in corners
    const area = document.getElementById("collageArea");
    photos.forEach((p, i) => {
        const cImg = document.createElement("img");
        cImg.src = p;
        cImg.className = "collage-img";
        cImg.style.left = Math.random() * 80 + "%";
        cImg.style.top = Math.random() * 80 + "%";
        setTimeout(() => area.appendChild(cImg), i * 500);
    });
}

// Prank No Button
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener('mouseover', () => {
    noBtn.style.left = Math.random() * 200 + "px";
    noBtn.style.top = (Math.random() * 100 - 50) + "px";
});

animate();
</script>
</body>
</html>
