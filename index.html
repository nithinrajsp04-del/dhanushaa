<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background: #000; 
        font-family: 'Poppins', sans-serif; color: #fff; 
    }

    /* THE STABLE LANDSCAPE WRAPPER */
    #landscape-stage {
        display: none; width: 100vw; height: 100vh;
        flex-direction: column; justify-content: center; align-items: center;
        padding: 10px; position: relative; z-index: 10;
    }

    /* PORTRAIT WARNING - Only shows if she holds it vertically */
    #portrait-warning {
        display: flex; width: 100vw; height: 100vh;
        flex-direction: column; justify-content: center; align-items: center;
        background: #000; color: #ffd65c; text-align: center; z-index: 9999;
    }

    @media (orientation: landscape) {
        #landscape-stage { display: flex; }
        #portrait-warning { display: none; }
    }

    canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

    .scene { 
        display: none; flex-direction: column; 
        align-items: center; justify-content: center; 
        width: 100%; height: 100%; text-align: center;
    }
    .active { display: flex !important; }

    /* TITLE - Scales to never be too big for landscape */
    .title { 
        font-size: clamp(24px, 10vh, 50px); 
        font-family: 'Great Vibes', cursive; 
        background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); 
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        margin: 5px 0;
    }

    .btn-row { display: flex; gap: 20px; margin-top: 10px; z-index: 100; }
    .btn { 
        padding: 8px 25px; font-size: 15px; border: none; 
        border-radius: 30px; cursor: pointer; font-weight: bold; 
        background: #4B79A1; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    }

    /* TEDDY - Shrunk for landscape visibility */
    #teddyPrank { transform: scale(0.45); display: none; margin: -10px 0; }
    .t-head { width: 110px; height: 100px; background: #eacda3; border-radius: 50%; border: 2px solid #d4a373; position: relative; }
    .t-body { width: 120px; height: 100px; background: #eacda3; border-radius: 40%; margin-top: -15px; border: 2px solid #d4a373; position: relative; }

    /* PHOTO - Auto-fits the wide screen */
    #mainImg { max-height: 65vh; max-width: 80%; border: 4px solid white; border-radius: 10px; object-fit: contain; }

    .shake { animation: v 0.1s infinite; }
    @keyframes v { 0%,100% {transform:translate(0);} 25% {transform:translate(-3px,3px);} 50% {transform:translate(3px,-3px);} }
</style>
</head>
<body>

<div id="portrait-warning">
    <div style="font-size: 45px; animation: rotate 2s infinite ease-in-out;">📱🔄</div>
    <h2 style="font-family: 'Great Vibes'; font-size: 30px;">For Dhanushaaaa ✨</h2>
    <p>Please turn your phone to <b>Landscape</b>!</p>
</div>

<div id="landscape-stage">
    <canvas id="galaxy"></canvas>
    <audio id="music" loop><source src="music.mp3"></audio>

    <div id="introScene" class="scene active">
        <h1 class="title">Dhanushaaaa ✨</h1>
        <p style="margin: 0; font-size: 14px; opacity: 0.8;">Ready for your surprise?</p>
        <div id="teddyPrank">
            <div class="t-head"></div>
            <div class="t-body"><div style="position:absolute; right:-20px; top:15px; font-size:35px;">🔫</div></div>
        </div>
        <div class="btn-row" id="btnGroup">
            <button class="btn" onclick="nextScene('candleScene')">YES</button>
            <button id="noBtn" class="btn" style="background:#ff4d4d;" onclick="doPrank()">NO</button>
        </div>
    </div>

    <div id="candleScene" class="scene">
        <div id="countdown" style="font-size: 45px; color: #ffd65c; font-family: 'Great Vibes';">✨</div>
        <div style="width: 10px; height: 40px; background: #eee; border-radius: 4px; position: relative; margin: 10px;">
            <div id="flame" onclick="blowOut()" style="display:none; position: absolute; top: -35px; left: -10px; width: 30px; height: 45px; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50%;"></div>
        </div>
        <button id="startBtn" class="btn" onclick="runCountdown()">START</button>
    </div>

    <div id="cakeScene" class="scene">
        <h2 class="title">Cut your cake! 🎂</h2>
        <div style="width: 120px; height: 60px; background: #C84B81; border-radius: 10px; border: 3px solid #fff; margin: 10px;"></div>
        <button id="cutBtn" class="btn" onclick="cutCake()">CUT CAKE</button>
        <p id="cakeMsg" style="font-family: 'Great Vibes'; font-size: 20px; color: #ffd65c; margin-top: 5px;"></p>
    </div>

    <div id="photoScene" class="scene"><img id="mainImg" src=""></div>

    <div id="finalScene" class="scene">
        <h1 class="title">Happy Birthday Baddieeee 🎉</h1>
        <p style="font-family: 'Great Vibes'; font-size: 22px; color: #ffd65c;">Still the coolest girl in the universe ✨</p>
    </div>
</div>

<script>
    let heartMode = false, fireworkMode = false, particles = [];
    const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.png"];

    function nextScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function doPrank() {
        document.getElementById("landscape-stage").classList.add("shake");
        document.getElementById("btnGroup").style.display = "none";
        document.getElementById("teddyPrank").style.display = "block";
        setTimeout(() => {
            document.getElementById("landscape-stage").classList.remove("shake");
            document.getElementById("teddyPrank").style.display = "none";
            document.getElementById("btnGroup").style.display = "flex";
            const no = document.getElementById("noBtn");
            no.style.position = "absolute";
            no.style.left = Math.random() * 60 + "%"; no.style.top = Math.random() * 60 + "%";
        }, 1500);
    }

    function runCountdown() {
        document.getElementById("startBtn").style.display = "none";
        let c = 5;
        const cd = document.getElementById("countdown");
        const t = setInterval(() => {
            c--; cd.innerText = c;
            if(c<=0){ clearInterval(t); cd.innerText="❤️"; document.getElementById("flame").style.display="block"; }
        }, 1000);
    }

    function blowOut() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("music").play();
        setTimeout(() => nextScene('cakeScene'), 1000);
    }

    function cutCake() {
        document.getElementById("cutBtn").style.display = "none";
        document.getElementById("cakeMsg").innerText = "A bite for you... 😋";
        setTimeout(() => { nextScene('photoScene'); startGallery(); }, 2500);
    }

    function startGallery() {
        let idx = 0;
        const img = document.getElementById("mainImg");
        img.src = photos[idx];
        const loop = setInterval(() => {
            idx++;
            if(idx >= photos.length) { clearInterval(loop); startFinal(); return; }
            img.style.opacity = 0;
            setTimeout(() => { img.src = photos[idx]; img.style.opacity = 1; }, 500);
        }, 6000);
    }

    function startFinal() { nextScene('finalScene'); heartMode = true; fireworkMode = true; }

    // CANVAS
    const cvs = document.getElementById("galaxy");
    const x = cvs.getContext("2d");
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    let stars = [];
    for(let i=0; i<80; i++) stars.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*1.2});

    function render() {
        x.clearRect(0,0,cvs.width,cvs.height);
        stars.forEach((s, i) => {
            if(heartMode) {
                let t = i/stars.length*Math.PI*2;
                let hx = 16*Math.pow(Math.sin(t),3);
                let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
                s.x += (cvs.width/2 + hx*8 - s.x) * 0.01; s.y += (cvs.height/2 - hy*8 - s.y) * 0.01;
            } else { s.y += 0.3; if(s.y > cvs.height) s.y = 0; }
            x.fillStyle = "#fff"; x.fillRect(s.x, s.y, s.s, s.s);
        });
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.l -= 1;
            x.fillStyle = p.c; x.beginPath(); x.arc(p.x, p.y, p.sz, 0, Math.PI*2); x.fill();
            if(p.l <= 0) particles.splice(i,1);
        });
        if(fireworkMode && Math.random() < 0.05) {
            let px = Math.random()*cvs.width, py = Math.random()*cvs.height*0.5;
            for(let i=0; i<15; i++) particles.push({x:px, y:py, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, l:45, c:'#ffd65c', sz:1.5});
        }
        requestAnimationFrame(render);
    }
    render();
    window.onresize = () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; };
</script>
</body>
</html>
