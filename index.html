<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    /* 1. THE ROTATION FIX (ONLY THIS PART IS NEW) */
    body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
    
    #mainLayout {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        width: 100vw; height: 100vh; transition: transform 0.5s ease;
    }

    /* Force landscape view on vertical phones */
    @media screen and (orientation: portrait) {
        #mainLayout {
            transform: rotate(90deg);
            width: 100vh;
            height: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
        }
    }

    /* 2. YOUR ORIGINAL AESTHETIC STYLES (NO CHANGES HERE) */
    canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
    .scene { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; font-family: 'Poppins', sans-serif; color: #fff; text-align: center; }
    .active { display: flex !important; }

    .title { font-size: clamp(35px, 8vw, 75px); font-family: 'Great Vibes', cursive; background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin: 10px; }
    .btn { padding: 15px 45px; font-size: 20px; border: none; border-radius: 35px; cursor: pointer; font-weight: bold; transition: 0.3s; z-index: 100; }
    
    #mainImg { max-width: 80%; max-height: 70%; border: 8px solid white; border-radius: 15px; animation: photoGlow 4s infinite; transition: opacity 1s; }
    @keyframes photoGlow { 0%, 100% { box-shadow: 0 0 10px rgba(255,255,255,0.3); } 50% { box-shadow: 0 0 25px rgba(255, 214, 92, 0.8); } }

    .btn-row { display: flex; flex-direction: row; gap: 50px; margin-top: 30px; z-index: 200; position: relative; }
    
    /* TEDDY PRANK */
    #teddyPrank { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.8); z-index: 300; display: none; }
    .t-head { width: 120px; height: 105px; background: #eacda3; border-radius: 50%; border: 2px solid #d4a373; position: relative; }
    .t-body { width: 130px; height: 110px; background: #eacda3; border-radius: 42%; margin-top: -25px; border: 2px solid #d4a373; }
    #gunIcon { position: absolute; right: -35px; bottom: 30px; font-size: 50px; }

    .shake-effect { animation: vibrate 0.1s linear infinite; }
    @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } 100% { transform: translate(0); } }
</style>
</head>
<body>

<div id="mainLayout">
    <canvas id="galaxy"></canvas>
    <audio id="music" loop><source src="music.mp3"></audio>

    <div id="introScene" class="scene active">
        <h1 class="title">Dhanushaaaa ✨</h1>
        <p>Ready for your surprise?</p>
        <div id="teddyPrank">
            <div class="t-head"></div>
            <div class="t-body"><div id="gunIcon">🔫</div></div>
        </div>
        <div class="btn-row" id="btnGroup">
            <button class="btn" style="background:#4B79A1; color:white;" onclick="nextScene('candleScene')">YES</button>
            <button id="noBtn" class="btn" style="background:#ff4d4d; color:white;" onmouseover="doPrank()" onclick="doPrank()">NO</button>
        </div>
    </div>

    <div id="candleScene" class="scene">
        <h1 class="title">Make a Wish...</h1>
        <button class="btn" style="background:#4B79A1; color:white;" onclick="nextScene('photoScene'); startGallery();">Next ✨</button>
    </div>

    <div id="photoScene" class="scene">
        <img id="mainImg" src="photo1.jpg">
    </div>
</div>

<script>
    // 3. YOUR ORIGINAL JAVASCRIPT
    let heartMode = false;
    const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];

    function nextScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function doPrank() {
        document.getElementById("mainLayout").classList.add("shake-effect");
        document.getElementById("teddyPrank").style.display = "block";
        setTimeout(() => {
            document.getElementById("mainLayout").classList.remove("shake-effect");
            document.getElementById("teddyPrank").style.display = "none";
            const no = document.getElementById("noBtn");
            no.style.position = "absolute";
            no.style.left = Math.random() * 70 + "%"; no.style.top = Math.random() * 70 + "%";
        }, 2000);
    }

    function startGallery() {
        let idx = 0;
        const img = document.getElementById("mainImg");
        setInterval(() => {
            idx = (idx + 1) % photos.length;
            img.src = photos[idx];
        }, 4000);
    }

    // GALAXY RENDER
    const cvs = document.getElementById("galaxy");
    const x = cvs.getContext("2d");
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    let stars = [];
    for(let i=0; i<200; i++) stars.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*1.5});

    function render() {
        x.clearRect(0,0,cvs.width,cvs.height);
        stars.forEach(s => {
            s.y += 0.5; if(s.y > cvs.height) s.y = 0;
            x.fillStyle = "#fff"; x.fillRect(s.x, s.y, s.s, s.s);
        });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
