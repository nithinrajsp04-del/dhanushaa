<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; }
    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background: #000; 
        font-family: 'Poppins', sans-serif; color: #fff; 
    }

    /* THE ROTATION GUARD - Only shows when portrait */
    #orientationGuard {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle, #1a1a1a, #000);
        z-index: 9999; display: flex; 
        flex-direction: column; justify-content: center; align-items: center; 
        color: #ffd65c; text-align: center;
    }

    /* Hide the guard and show content ONLY when in landscape */
    @media screen and (min-aspect-ratio: 1/1) {
        #orientationGuard { display: none !important; }
        .scene.active { display: flex !important; }
    }

    .phone-icon { font-size: 60px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }

    canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000; }

    .scene { 
        position: absolute; width: 100%; height: 100%; 
        display: none; flex-direction: column; 
        justify-content: center; align-items: center; 
        padding: 20px; z-index: 10; 
    }
    
    .active { display: flex; }

    .title { 
        font-size: clamp(30px, 10vh, 65px); 
        font-family: 'Great Vibes', cursive; 
        background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); 
        -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
        margin: 10px 0; 
    }

    /* BUTTONS - Large and tap-friendly for mobile */
    .btn-row { display: flex; gap: 30px; margin-top: 20px; z-index: 500; }
    .btn { 
        padding: 12px 35px; font-size: 18px; border: none; 
        border-radius: 40px; cursor: pointer; font-weight: bold; 
        transition: transform 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.9); }

    /* TEDDY */
    #teddyPrank { position: relative; transform: scale(0.7); display: none; margin-bottom: 20px; }
    .t-head { width: 120px; height: 105px; background: #eacda3; border-radius: 50%; position: relative; border: 2px solid #d4a373; }
    .t-body { width: 130px; height: 110px; background: #eacda3; border-radius: 40%; margin-top: -20px; border: 2px solid #d4a373; }

    /* IMAGES */
    #mainImg { max-width: 70%; max-height: 60%; border: 6px solid white; border-radius: 15px; }
    .collage-img { position: absolute; width: 80px; height: 80px; object-fit: cover; border: 2px solid white; border-radius: 10px; opacity: 0; transition: opacity 1.5s; }

    .shake-effect { animation: vibrate 0.1s linear infinite; }
    @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(-4px, 4px); } 50% { transform: translate(4px, -4px); } 100% { transform: translate(0); } }
</style>
</head>
<body id="mainBody">

<div id="orientationGuard">
    <div class="phone-icon">📱🔄</div>
    <h2 style="font-family: 'Great Vibes'; font-size: 32px;">Dhanushaaaa...</h2>
    <p style="padding: 0 30px;">Please turn your phone <b>sideways (Landscape)</b> to unlock the surprise! ✨</p>
</div>

<canvas id="galaxy"></canvas>
<audio id="music" loop><source src="music.mp3"></audio>

<div id="introScene" class="scene active">
    <h1 class="title">Dhanushaaaa ✨</h1>
    <p id="promptMsg">Ready for your surprise?</p>
    <div id="teddyPrank">
        <div class="t-head"></div>
        <div class="t-body"><div style="position:absolute; right:-20px; top:20px; font-size:40px;">🔫</div></div>
    </div>
    <div class="btn-row" id="btnGroup">
        <button class="btn" style="background:#4B79A1; color:white;" onclick="nextScene('candleScene')">YES</button>
        <button id="noBtn" class="btn" style="background:#ff4d4d; color:white;" onmouseover="doPrank()" onclick="doPrank()">NO</button>
    </div>
</div>

<div id="candleScene" class="scene">
    <div id="countdown" style="font-size: 70px; color: #ffd65c; font-family: 'Great Vibes';">✨</div>
    <div style="width: 20px; height: 70px; background: #eee; border-radius: 5px; position: relative; margin: 20px 0;">
        <div id="flame" onclick="blowOut()" style="display:none; position: absolute; top: -40px; left: -5px; width: 30px; height: 45px; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50%;"></div>
    </div>
    <button id="startBtn" class="btn" style="background:#4B79A1; color:white;" onclick="runCountdown()">START BIRTHDAY</button>
</div>

<div id="cakeScene" class="scene">
    <h2 class="title" style="font-size: 35px;">Cut your cake! 🎂</h2>
    <div style="width: 160px; height: 80px; background: pink; border-radius: 15px; border: 3px solid #fff; margin-bottom: 20px;"></div>
    <button id="cutBtn" class="btn" style="background:#4B79A1; color:white;" onclick="cutCake()">CUT THE CAKE</button>
    <p id="cakeMsg" style="font-family: 'Great Vibes'; font-size: 30px; color: #ffd65c;"></p>
</div>

<div id="photoScene" class="scene">
    <img id="mainImg" src="">
</div>

<div id="finalScene" class="scene">
    <h1 class="title" style="font-size: 40px;">Happy Birthday Baddieeee 🎉</h1>
    <p style="font-family: 'Great Vibes'; font-size: 24px; color: #ffd65c;">Still the coolest girl in the universe ✨</p>
    <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0; pointer-events:none;"></div>
</div>

<script>
    let heartMode = false, fireworkMode = false, particles = [];
    const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.png"];

    function nextScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function doPrank() {
        document.getElementById("mainBody").classList.add("shake-effect");
        document.getElementById("btnGroup").style.display = "none";
        document.getElementById("teddyPrank").style.display = "block";
        setTimeout(() => {
            document.getElementById("mainBody").classList.remove("shake-effect");
            document.getElementById("teddyPrank").style.display = "none";
            document.getElementById("btnGroup").style.display = "flex";
            const no = document.getElementById("noBtn");
            no.style.position = "absolute";
            no.style.left = Math.random() * 60 + "%"; no.style.top = Math.random() * 60 + "%";
        }, 2000);
    }

    function runCountdown() {
        document.getElementById("startBtn").style.display = "none";
        let c = 5;
        const cd = document.getElementById("countdown");
        const t = setInterval(() => {
            c--; cd.innerText = c;
            if(c<=0){ clearInterval(t); cd.innerText="❤️"; document.getElementById("flame").style.display="block"; }
        }, 1000);
    }

    function blowOut() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("music").play();
        setTimeout(() => nextScene('cakeScene'), 1000);
    }

    function cutCake() {
        document.getElementById("cutBtn").style.display = "none";
        document.getElementById("cakeMsg").innerText = "A small bite for you... 😋";
        setTimeout(() => {
            document.getElementById("cakeMsg").innerText = "Wait Supergirllll... 😎✨";
            setTimeout(() => { nextScene('photoScene'); startGallery(); }, 2500);
        }, 2500);
    }

    function startGallery() {
        let idx = 0;
        const img = document.getElementById("mainImg");
        img.src = photos[idx];
        const loop = setInterval(() => {
            idx++;
            if(idx >= photos.length) { clearInterval(loop); startFinal(); return; }
            img.style.opacity = 0;
            setTimeout(() => { img.src = photos[idx]; img.style.opacity = 1; }, 500);
        }, 6000);
    }

    function startFinal() {
        nextScene('finalScene');
        heartMode = true; fireworkMode = true;
        const locs = [{top:'5%', left:'5%'}, {top:'5%', right:'5%'}, {top:'40%', left:'5%'}, {top:'40%', right:'5%'}, {bottom:'5%', left:'5%'}, {bottom:'5%', right:'5%'}];
        photos.slice(0, 6).forEach((s, i) => {
            setTimeout(() => {
                const el = document.createElement("img"); el.src = s; el.className = "collage-img";
                const p = locs[i];
                if(p.top) el.style.top = p.top; if(p.bottom) el.style.bottom = p.bottom;
                if(p.left) el.style.left = p.left; if(p.right) el.style.right = p.right;
                document.getElementById("collageArea").appendChild(el);
                setTimeout(() => el.style.opacity = "1", 100);
            }, i * 1200);
        });
    }

    // GALAXY ENGINE
    const cvs = document.getElementById("galaxy");
    const x = cvs.getContext("2d");
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    let stars = [];
    for(let i=0; i<150; i++) stars.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*1.5});

    function render() {
        x.clearRect(0,0,cvs.width,cvs.height);
        stars.forEach((s, i) => {
            if(heartMode) {
                let t = i/stars.length*Math.PI*2;
                let hx = 16*Math.pow(Math.sin(t),3);
                let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
                s.x += (cvs.width/2 + hx*13 - s.x) * 0.003; s.y += (cvs.height/2 - hy*13 - s.y) * 0.003;
            } else { s.y += 0.4; if(s.y > cvs.height) s.y = 0; }
            x.fillStyle = "#fff"; x.fillRect(s.x, s.y, s.s, s.s);
        });
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.l -= 1;
            x.fillStyle = p.c; x.beginPath(); x.arc(p.x, p.y, p.sz, 0, Math.PI*2); x.fill();
            if(p.l <= 0) particles.splice(i,1);
        });
        if(fireworkMode && Math.random() < 0.05) {
            let px = Math.random()*cvs.width, py = Math.random()*cvs.height*0.5;
            for(let i=0; i<30; i++) particles.push({x:px, y:py, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, l:50, c:'#ffd65c', sz:2});
        }
        requestAnimationFrame(render);
    }
    render();
    window.onresize = () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; };
</script>
</body>
</html>
