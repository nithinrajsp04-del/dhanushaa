<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

canvas { position: fixed; top: 0; left: 0; pointer-events: none; }

.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.active { display: flex; }

.title { 
    font-size: 75px; 
    font-family: 'Great Vibes', cursive; 
    background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); 
    -webkit-background-clip:text; 
    -webkit-text-fill-color:transparent;
}

/* --- THE BEAUTIFUL BEIGE & CRISP WHITE TEDDY --- */
.teddy-wrapper { position: relative; width: 220px; height: 280px; margin-bottom: 20px; }
.t-ear { width: 50px; height: 50px; background: #d2b48c; border-radius: 50%; position: absolute; top: 0; z-index: 2;}
.t-ear.left { left: 30px; } .t-ear.right { right: 30px; }
.t-ear::after { content: ''; position: absolute; width: 25px; height: 25px; background: #ffffff; border-radius: 50%; top: 12px; left: 12px; }
.t-head { width: 120px; height: 100px; background: #d2b48c; border-radius: 50%; position: absolute; top: 20px; left: 50px; z-index: 4; box-shadow: inset -8px -8px 15px rgba(0,0,0,0.15); }
.t-eye { width: 14px; height: 14px; background: #222; border-radius: 50%; position: absolute; top: 40px; }
.t-eye::after { content:''; width:4px; height:4px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; }
.t-eye.left { left: 30px; } .t-eye.right { right: 30px; }
.t-muzzle { width: 50px; height: 40px; background: #ffffff; border-radius: 50%; position: absolute; top: 55px; left: 35px; }
.t-nose { width: 16px; height: 10px; background: #5d4037; border-radius: 40%; position: absolute; top: 8px; left: 17px; }
.t-body { width: 130px; height: 130px; background: #d2b48c; border-radius: 45% 45% 40% 40%; position: absolute; top: 100px; left: 45px; z-index: 3; }
.t-belly { width: 80px; height: 90px; background: #ffffff; border-radius: 50%; position: absolute; top: 25px; left: 25px; opacity: 0.9; }
.t-arm { width: 40px; height: 80px; background: #d2b48c; border-radius: 20px; position: absolute; top: 115px; z-index: 2; transform-origin: top; }
.t-arm.left { left: 15px; transform: rotate(25deg); }
.t-arm.right { right: 15px; transform: rotate(-25deg); }
.t-leg { width: 55px; height: 75px; background: #d2b48c; border-radius: 25px; position: absolute; bottom: 5px; z-index: 5; }
.t-leg.left { left: 35px; transform: rotate(-10deg); }
.t-leg.right { right: 35px; transform: rotate(10deg); }
.t-leg::after { content: ''; position: absolute; width: 35px; height: 35px; background: #ffffff; border-radius: 50%; bottom: 10px; left: 10px; }

@keyframes waveHands { 0%, 100% { transform: rotate(25deg); } 50% { transform: rotate(125deg); } }

/* --- ELEGANT CANDLE --- */
.candle-body { 
    width: 25px; height: 90px; 
    background: linear-gradient(to right, #e0e0e0, #ffffff, #e0e0e0); 
    border-radius: 4px; position: relative; 
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.flame-container { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 20px; height: 40px; animation: flicker 0.1s infinite alternate; }
.flame-main { width: 100%; height: 100%; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50% 50% 20% 20%; filter: blur(1px); }

/* --- SLIDESHOW & COLLAGE --- */
#mainImg { max-width: 85%; max-height: 80%; border: 8px solid white; border-radius: 15px; box-shadow: 0 0 50px rgba(255,255,255,0.4); transition: all 0.8s ease-in-out; }
.small-photo { max-width: 50% !important; max-height: 50% !important; }

.collage-img { 
    position: absolute; width: 160px; height: 160px; object-fit: cover; 
    border: 4px solid white; border-radius: 10px; z-index: 5; opacity: 0; 
    animation: appear 1.5s forwards, photoBreath 4s infinite ease-in-out; 
}
@keyframes photoBreath { 
    0%, 100% { box-shadow: 0 0 10px rgba(255,255,255,0.3); transform: scale(1); } 
    50% { box-shadow: 0 0 30px rgba(255,92,200,0.6); transform: scale(1.03); } 
}
@keyframes appear { to { opacity: 1; } }

.btn { padding: 12px 35px; font-size: 18px; border: none; border-radius: 25px; cursor: pointer; font-family: 'Poppins'; font-weight: bold; margin-top: 20px; z-index: 20; }
#cutBtn { background: #ffd65c; box-shadow: 0 0 15px #ffd65c; animation: pulse 1.5s infinite; }
#noBtn { background: #333; color: #777; position: absolute; left: 180px; top: 0; }
</style>
</head>
<body>

<canvas id="galaxy"></canvas>
<canvas id="fireworks"></canvas>

<audio id="music" loop><source src="music.mp3"></audio>
<audio id="shotSound"><source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>

<div id="introScene" class="scene active">
    <h1 class="title">Dhanushaaaa ✨</h1>
    <p>Wait, I have a surprise for you... Ready?</p>
    <div id="teddyPrank" class="teddy-wrapper" style="display:none; transform: scale(0.85);">
        <div class="t-ear left"></div><div class="t-ear right"></div>
        <div class="t-head"><div class="t-eye left"></div><div class="t-eye right"></div><div class="t-muzzle"><div class="t-nose"></div></div></div>
        <div class="t-arm left" id="lArm"></div><div class="t-arm right" id="rArm"></div>
        <div class="t-body"><div class="t-belly"></div><div id="gun" style="width:45px; height:25px; background:#222; position:absolute; right:-25px; top:35px; display:none; border-radius:4px; z-index:10;"></div></div>
        <div class="t-leg left"></div><div class="t-leg right"></div>
    </div>
    <div id="btnContainer" style="position:relative; width:300px; height:100px;">
        <button id="yesBtn" class="btn" style="background:white;" onclick="sayYes()">YES</button>
        <button id="noBtn" class="btn">NO</button>
    </div>
</div>

<div id="candleScene" class="scene">
    <div id="countdown" style="font-size: 100px; font-family: 'Great Vibes'; color: #ffd65c; margin-bottom: 10px;">5</div>
    <div class="candle-body"><div class="wick"></div><div id="flame" class="flame-container"><div class="flame-main"></div></div></div>
    <p style="font-size: 28px; color: #ffd65c; font-weight: bold; font-family: 'Great Vibes'; margin-top: 25px;">Blow the candle!</p>
</div>

<div id="cakeScene" class="scene">
    <h2 class="title" style="font-size: 40px;">Time to cut your Cake! 🎂</h2>
    <p style="margin-bottom: 20px; color: #ffd65c; font-weight: bold;">(Tap the button below to cut)</p>
    <div style="width: 220px; height: 110px; background: pink; border-radius: 15px; position: relative; box-shadow: 0 10px 0 #fb4d64; border: 4px solid #fff;">
        <div id="knife" style="width: 80px; height: 10px; background: silver; position: absolute; top: -40px; right: -60px; transform: rotate(-45deg); display: none;"></div>
    </div>
    <button id="cutBtn" class="btn" onclick="doCut()">CUT THE CAKE</button>
    <div id="cakeMsg" style="margin-top: 25px; font-family: 'Great Vibes'; font-size: 45px;"></div>
</div>

<div id="photoScene" class="scene">
    <img id="mainImg">
</div>

<div id="finalScene" class="scene">
    <img id="lastPhoto" src="photo10.jpg" style="max-width: 70%; max-height: 60%; opacity: 0.35; border-radius: 20px; z-index: 1;">
    <h1 class="title" style="z-index: 10; font-size: 70px; margin-bottom: 0;">Happy Birthday Baddie 🎉</h1>
    <p style="z-index: 10; font-size: 22px; font-weight: bold;">Still the coolest girl in the universe 😎</p>
    <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0;"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const shotSound = document.getElementById("shotSound");
const teddy = document.getElementById("teddyPrank");

noBtn.addEventListener('mouseover', () => {
    noBtn.style.left = Math.random() * 200 + "px";
    noBtn.style.top = (Math.random() * 60) - 30 + "px";
});

noBtn.addEventListener('click', () => {
    teddy.style.display = "block";
    document.getElementById("gun").style.display = "block";
    document.body.style.animation = "shake 0.1s infinite";
    shotSound.play();
    setTimeout(() => { teddy.style.display = "none"; document.body.style.animation = ""; }, 3000);
});

function sayYes() {
    document.getElementById("btnContainer").style.display = "none";
    teddy.style.display = "block";
    document.getElementById("lArm").style.animation = "waveHands 0.5s infinite";
    document.getElementById("rArm").style.animation = "waveHands 0.5s infinite";
    setTimeout(() => { showScene("candleScene"); startCountdown(); }, 3000);
}

function showScene(id) {
    document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function startCountdown() {
    let count = 5;
    const cd = document.getElementById("countdown");
    const timer = setInterval(() => {
        count--; cd.innerText = count;
        if(count <= 0) {
            clearInterval(timer);
            document.getElementById("flame").style.display = "none";
            const music = document.getElementById("music");
            music.volume = 0; music.play();
            let vol = 0;
            let fadeIn = setInterval(() => {
                if (vol < 0.95) { vol += 0.05; music.volume = vol; }
                else clearInterval(fadeIn);
            }, 100);
            setTimeout(() => { showScene("cakeScene"); startCakeTimer(); }, 1500);
        }
    }, 1000);
}

let cutDone = false;
function startCakeTimer() { setTimeout(() => { if(!cutDone) doCut(); }, 9000); }

function doCut() {
    if(cutDone) return;
    cutDone = true;
    document.getElementById("knife").style.display = "block";
    document.getElementById("knife").style.animation = "sliceAnim 1s forwards";
    setTimeout(() => {
        const ct = document.getElementById("cakeMsg");
        ct.innerHTML = "A small bite for you 😋";
        setTimeout(() => {
            ct.innerHTML = "Waittt Supergirllll 😎✨";
            setTimeout(() => { showScene("photoScene"); startSlideshow(); }, 2500);
        }, 2000);
    }, 1000);
}

let photoFiles = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.png", "photo9.png"];
let pIdx = 0;

function startSlideshow() {
    const img = document.getElementById("mainImg");
    updatePhoto(img);
    const slide = setInterval(() => {
        pIdx++;
        if(pIdx >= photoFiles.length) { clearInterval(slide); startFinal(); return; }
        img.style.opacity = 0;
        setTimeout(() => { updatePhoto(img); img.style.opacity = 1; }, 800);
    }, 7000);
}

function updatePhoto(img) {
    img.src = photoFiles[pIdx];
    if(pIdx === 1 || pIdx === 7) img.classList.add("small-photo");
    else img.classList.remove("small-photo");
}

function startFinal() {
    showScene("finalScene");
    launchFireworks();
    heartMode = true; // STARTS THE SLOW FORMATION
    const spots = [{top:'5%', left:'5%'}, {top:'5%', right:'5%'}, {bottom:'5%', left:'5%'}, {bottom:'5%', right:'5%'}, {top:'40%', left:'2%'}, {top:'40%', right:'2%'}, {top:'20%', left:'15%'}, {top:'20%', right:'15%'}, {bottom:'20%', left:'45%'}];
    photoFiles.forEach((src, i) => {
        setTimeout(() => {
            const fImg = document.createElement("img");
            fImg.src = src; fImg.className = "collage-img";
            const pos = spots[i];
            if(pos.top) fImg.style.top = pos.top; if(pos.bottom) fImg.style.bottom = pos.bottom;
            if(pos.left) fImg.style.left = pos.left; if(pos.right) fImg.style.right = pos.right;
            document.getElementById("collageArea").appendChild(fImg);
        }, i * 1200);
    });
}

const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let stars = []; let heartMode = false;

for(let i=0; i<1500; i++) {
    stars.push({
        x: Math.random()*canvas.width, 
        y: Math.random()*canvas.height, 
        color: Math.random() > 0.85 ? "#ffd65c" : "white", 
        size: Math.random()*1.8,
        twinkle: Math.random() * 0.05
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach((s, i) => {
        if(heartMode) {
            let t = i/stars.length*Math.PI*2;
            let hx = 16*Math.pow(Math.sin(t),3);
            let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            let targetX = canvas.width/2 + hx*20;
            let targetY = canvas.height/2 - hy*20;
            
            // SLOW & ELEGANT FORMATION LOGIC (Lower multiplier = slower speed)
            s.x += (targetX - s.x) * 0.008; 
            s.y += (targetY - s.y) * 0.008;
        } else { 
            s.y += 0.2; if(s.y > canvas.height) s.y = 0; 
            s.size += s.twinkle; if(s.size > 2 || s.size < 0.5) s.twinkle *= -1;
        }
        ctx.fillStyle = s.color; ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    requestAnimationFrame(draw);
}
draw();

const fcan = document.getElementById("fireworks");
const fctx = fcan.getContext("2d");
fcan.width = window.innerWidth; fcan.height = window.innerHeight;
let fws = [];
function launchFirework() {
    let x = Math.random()*fcan.width;
    for(let i=0; i<35; i++) fws.push({x:x, y:fcan.height/2, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, life:100});
}
function launchFireworks() { setInterval(launchFirework, 1500); drawFws(); }
function drawFws() {
    fctx.clearRect(0,0,fcan.width,fcan.height);
    fws.forEach((p,i) => { p.x+=p.vx; p.y+=p.vy; p.life--; fctx.fillStyle = "gold"; fctx.fillRect(p.x, p.y, 2.5, 2.5); if(p.life<=0) fws.splice(i,1); });
    requestAnimationFrame(drawFws);
}
</script>

<style>
@keyframes sliceAnim { 0% { right: -60px; top: -40px; } 100% { right: 80px; top: 50px; } }
@keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0, 0); } }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
</style>
</body>
</html>
