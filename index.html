<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhanushaaaa ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

canvas { position: fixed; top: 0; left: 0; pointer-events: none; }

.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.active { display: flex; }

.title { 
    font-size: 75px; 
    font-family: 'Great Vibes', cursive; 
    background: linear-gradient(45deg,#ff5cc8,#ffd65c,#5ce1ff); 
    -webkit-background-clip:text; 
    -webkit-text-fill-color:transparent;
}

/* --- TEDDY DESIGN --- */
.teddy-wrapper { position: relative; width: 220px; height: 280px; margin-bottom: 20px; }
.t-ear { width: 50px; height: 50px; background: #d2b48c; border-radius: 50%; position: absolute; top: 0; z-index: 2;}
.t-ear.left { left: 30px; } .t-ear.right { right: 30px; }
.t-ear::after { content: ''; position: absolute; width: 25px; height: 25px; background: #ffffff; border-radius: 50%; top: 12px; left: 12px; }
.t-head { width: 120px; height: 100px; background: #d2b48c; border-radius: 50%; position: absolute; top: 20px; left: 50px; z-index: 4; box-shadow: inset -8px -8px 15px rgba(0,0,0,0.15); }
.t-eye { width: 14px; height: 14px; background: #222; border-radius: 50%; position: absolute; top: 40px; }
.t-eye.left { left: 30px; } .t-eye.right { right: 30px; }
.t-muzzle { width: 50px; height: 40px; background: #ffffff; border-radius: 50%; position: absolute; top: 55px; left: 35px; }
.t-nose { width: 16px; height: 10px; background: #5d4037; border-radius: 40%; position: absolute; top: 8px; left: 17px; }
.t-body { width: 130px; height: 130px; background: #d2b48c; border-radius: 45% 45% 40% 40%; position: absolute; top: 100px; left: 45px; z-index: 3; }
.t-belly { width: 80px; height: 90px; background: #ffffff; border-radius: 50%; position: absolute; top: 25px; left: 25px; opacity: 0.9; }
.t-arm { width: 40px; height: 80px; background: #d2b48c; border-radius: 20px; position: absolute; top: 115px; z-index: 2; transform-origin: top; }
.t-arm.left { left: 15px; transform: rotate(25deg); }
.t-arm.right { right: 15px; transform: rotate(-25deg); }
.t-leg { width: 55px; height: 75px; background: #d2b48c; border-radius: 25px; position: absolute; bottom: 5px; z-index: 5; }
.t-leg.left { left: 35px; transform: rotate(-10deg); }
.t-leg.right { right: 35px; transform: rotate(10deg); }
.t-leg::after { content: ''; position: absolute; width: 35px; height: 35px; background: #ffffff; border-radius: 50%; bottom: 10px; left: 10px; }

@keyframes waveHands { 0%, 100% { transform: rotate(25deg); } 50% { transform: rotate(125deg); } }

/* --- BUTTONS --- */
.btn { padding: 12px 35px; font-size: 18px; border: none; border-radius: 25px; cursor: pointer; font-family: 'Poppins'; font-weight: bold; margin-top: 20px; z-index: 20; }
#yesBtn { background: #4B79A1; color: white; }
#noBtn { background: #333; color: #777; position: absolute; }
#startBdayBtn { background: #C84B81; color: white; }
#cutBtn { background: #ffd65c; box-shadow: 0 0 15px #ffd65c; }

/* --- SLIDESHOW --- */
#mainImg { max-width: 85%; max-height: 80%; border: 8px solid white; border-radius: 15px; transition: all 0.8s ease-in-out; }
.collage-img { position: absolute; width: 160px; height: 160px; object-fit: cover; border: 4px solid white; border-radius: 10px; z-index: 5; opacity: 0; animation: appear 1.5s forwards; }

@keyframes appear { to { opacity: 1; } }
@keyframes flicker { from { transform: scale(1) translateX(-50%); } to { transform: scale(1.1) translateX(-50%); } }
@keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0, 0); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<audio id="music" loop><source src="music.mp3"></audio>
<audio id="shotSound"><source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>

<div id="introScene" class="scene active">
    <h1 class="title">Dhanushaaaa ✨</h1>
    <p>Wait, I have a surprise for you... Ready?</p>
    <div id="teddyPrank" class="teddy-wrapper" style="display:none; transform: scale(0.85);">
        <div class="t-ear left"></div><div class="t-ear right"></div>
        <div class="t-head"><div class="t-eye left"></div><div class="t-eye right"></div><div class="t-muzzle"><div class="t-nose"></div></div></div>
        <div class="t-arm left" id="lArm"></div><div class="t-arm right" id="rArm"></div>
        <div class="t-body"><div class="t-belly"></div><div id="gun" style="width:45px; height:25px; background:#222; position:absolute; right:-25px; top:35px; display:none; border-radius:4px;"></div></div>
        <div class="t-leg left"></div><div class="t-leg right"></div>
    </div>
    <div id="btnContainer" style="position:relative; width:300px; height:100px;">
        <button id="yesBtn" class="btn" onclick="sayYes()">YES</button>
        <button id="noBtn" class="btn">NO</button>
    </div>
</div>

<div id="candleScene" class="scene">
    <div id="countdown" style="font-size: 80px; font-family: 'Great Vibes'; color: #ffd65c; margin-bottom: 10px;">✨</div>
    <div class="candle-body" style="width: 25px; height: 90px; background: linear-gradient(to right, #e0e0e0, #ffffff, #e0e0e0); border-radius: 4px; position: relative;">
        <div id="flame" class="flame-container" onclick="blowOut()" style="display:none; position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 30px; height: 50px; cursor: pointer; animation: flicker 0.1s infinite alternate;">
            <div style="width: 100%; height: 100%; background: radial-gradient(ellipse at bottom, #fff, #ffcc00 40%, #ff6600 70%, transparent 90%); border-radius: 50% 50% 20% 20%; filter: blur(1px);"></div>
        </div>
    </div>
    <button id="startBdayBtn" class="btn" onclick="triggerCountdown()">START BIRTHDAY ✨</button>
    <p id="blowText" style="font-size: 28px; color: #ffd65c; font-weight: bold; font-family: 'Great Vibes'; margin-top: 25px; display:none;">Tap the flame to blow it out!</p>
</div>

<div id="cakeScene" class="scene">
    <h2 class="title" style="font-size: 40px;">Time to cut your Cake! 🎂</h2>
    <div style="width: 220px; height: 110px; background: pink; border-radius: 15px; position: relative; border: 4px solid #fff; margin-bottom: 20px;">
        <div id="knife" style="width: 80px; height: 10px; background: silver; position: absolute; top: -40px; right: -60px; transform: rotate(-45deg); display: none;"></div>
    </div>
    <button id="cutBtn" class="btn" onclick="doCut()">CUT THE CAKE</button>
    <div id="cakeMsg" style="margin-top: 25px; font-family: 'Great Vibes'; font-size: 45px;"></div>
</div>

<div id="photoScene" class="scene">
    <img id="mainImg">
</div>

<div id="finalScene" class="scene">
    <img id="lastPhoto" src="photo10.jpg" style="max-width: 70%; max-height: 60%; opacity: 0.35; border-radius: 20px;">
    <h1 class="title" style="font-size: 70px;">Happy Birthday Baddie 🎉</h1>
    <div id="collageArea" style="width:100%; height:100%; position:absolute; top:0; left:0;"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let fireworks = [];
let heartMode = false;
let fireworkMode = false;

// Initialize Stars
for(let i=0; i<800; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        color: "white",
        size: Math.random() * 1.5
    });
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = {
            x: (Math.random() - 0.5) * 8,
            y: (Math.random() - 0.5) * 8
        };
        this.opacity = 1;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.opacity -= 0.01;
    }
}

function createFirework() {
    if (!fireworkMode) return;
    const x = Math.random() * canvas.width;
    const y = Math.random() * (canvas.height * 0.5);
    const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
    for (let i = 0; i < 40; i++) {
        fireworks.push(new Particle(x, y, color));
    }
}

function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    stars.forEach((s, i) => {
        if(heartMode) {
            let t = i/stars.length*Math.PI*2;
            let hx = 16*Math.pow(Math.sin(t),3);
            let hy = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            s.x += (canvas.width/2 + hx*18 - s.x) * 0.01; 
            s.y += (canvas.height/2 - hy*18 - s.y) * 0.01;
        } else {
            s.y += 0.2;
            if(s.y > canvas.height) s.y = 0;
        }
        ctx.fillStyle = s.color;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });

    fireworks.forEach((p, i) => {
        if (p.opacity <= 0) {
            fireworks.splice(i, 1);
        } else {
            p.update();
            p.draw();
        }
    });

    if (fireworkMode && Math.random() < 0.05) createFirework();
    requestAnimationFrame(animate);
}

// Logic for Scene Transitions
function showScene(id) {
    document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function sayYes() {
    document.getElementById("btnContainer").style.display = "none";
    document.getElementById("teddyPrank").style.display = "block";
    setTimeout(() => { showScene("candleScene"); }, 2000);
}

function triggerCountdown() {
    document.getElementById("startBdayBtn").style.display = "none";
    let count = 5;
    const cd = document.getElementById("countdown");
    const timer = setInterval(() => {
        count--;
        cd.innerText = count;
        if(count <= 0) {
            clearInterval(timer);
            cd.innerText = "❤️";
            document.getElementById("flame").style.display = "block";
            document.getElementById("blowText").style.display = "block";
        }
    }, 1000);
}

function blowOut() {
    document.getElementById("flame").style.display = "none";
    const music = document.getElementById("music");
    music.play();
    setTimeout(() => { showScene("cakeScene"); }, 2000);
}

function doCut() {
    document.getElementById("knife").style.display = "block";
    document.getElementById("knife").style.animation = "sliceAnim 1s forwards";
    setTimeout(() => {
        document.getElementById("cakeMsg").innerHTML = "A small bite for you 😋";
        setTimeout(() => { showScene("photoScene"); startSlideshow(); }, 2000);
    }, 1000);
}

let photoFiles = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg", "photo7.jpg", "photo8.jpg", "photo9.jpg"];
let pIdx = 0;

function startSlideshow() {
    const img = document.getElementById("mainImg");
    img.src = photoFiles[pIdx];
    const slide = setInterval(() => {
        pIdx++;
        if(pIdx >= photoFiles.length) {
            clearInterval(slide);
            startFinal();
            return;
        }
        img.style.opacity = 0;
        setTimeout(() => { img.src = photoFiles[pIdx]; img.style.opacity = 1; }, 800);
    }, 8000); // 8 SECONDS
}

function startFinal() {
    showScene("finalScene");
    heartMode = true;
    fireworkMode = true; // TRIGGER FIREWORKS HERE
}

// Prank No Button
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener('mouseover', () => {
    noBtn.style.left = Math.random() * 200 + "px";
    noBtn.style.top = (Math.random() * 60) - 30 + "px";
});

animate();
</script>

<style>
@keyframes sliceAnim { 0% { right: -60px; top: -40px; } 100% { right: 80px; top: 50px; } }
@keyframes flicker { from { transform: scale(1) translateX(-50%); } to { transform: scale(1.1) translateX(-50%); } }
</style>
</body>
</html>
